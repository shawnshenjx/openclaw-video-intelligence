[tool:pytest]
# Pytest configuration for Memories CLI skill tests
minversion = 6.0
addopts = 
    -ra
    --strict-markers
    --strict-config
    --cov=scripts
    --cov-report=term-missing
    --cov-report=html:tests/coverage
    --cov-report=xml
    -v
    --tb=short
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    unit: Unit tests for individual functions
    integration: Integration tests with real API calls
    performance: Performance and load tests
    slow: Tests that take more than 2 seconds
    network: Tests that require internet connection
    requires_api_key: Tests that require MEMORIES_API_KEY
filterwarnings =
    error
    ignore::UserWarning
    ignore::DeprecationWarning